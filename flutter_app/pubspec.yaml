name: agrismart
description: Application de suivi des prix agricoles au Sénégal
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP & Networking
  http: ^1.1.2
  dio: ^5.4.0

  # State Management
  provider: ^6.1.1

  # Maps
  google_maps_flutter: ^2.5.3

  # Charts
  fl_chart: ^0.66.2

  # Auth & Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # UI Components
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.0.0
  animated_text_kit: ^4.2.2

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.2
  image_picker: ^1.0.7
  geolocator: ^11.0.0
  permission_handler: ^11.2.0

  # Export & Share
  pdf: ^3.10.7
  csv: ^5.1.1
  share_plus: ^7.2.1
  path_provider: ^2.1.1
  open_file: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

